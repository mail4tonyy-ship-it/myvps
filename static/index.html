<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>服务器全景探针</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #2563eb;
      --good: #0f9f6e;
      --warn: #d97706;
      --bad: #dc2626;
      --shadow: 0 8px 24px rgba(20, 30, 50, .07);
    }
    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #101318;
      --surface: #181d24;
      --ink: #eef2f7;
      --muted: #9aa6b6;
      --line: #2c3440;
      --accent: #60a5fa;
      --shadow: none;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); letter-spacing: 0; }
    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    .shell { max-width: 1280px; margin: 0 auto; padding: 18px; }
    header { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; margin-bottom: 18px; }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 38px); line-height: 1.1; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .icon-btn, .text-btn { height: 38px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; color: var(--ink); background: var(--surface); border: 1px solid var(--line); padding: 0 12px; box-shadow: var(--shadow); }
    .icon-btn { width: 38px; padding: 0; }
    .primary { background: var(--accent); border-color: var(--accent); color: white; }
    .danger { color: var(--bad); }
    .segmented { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: color-mix(in srgb, var(--surface) 78%, var(--bg)); }
    .segmented button { height: 32px; min-width: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; background: transparent; color: var(--muted); }
    .segmented button.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 14px; }
    .stat, .panel, .server { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .stat { padding: 16px; min-height: 96px; }
    .label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .value { margin-top: 10px; font-size: 26px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .servers { grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); align-items: stretch; }
    .server { padding: 14px; display: grid; gap: 12px; }
    .server-top { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: start; }
    .server-name { font-weight: 800; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; overflow-wrap: anywhere; }
    .pill { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px; border-radius: 999px; font-size: 12px; font-weight: 800; background: #eef2ff; color: #1d4ed8; }
    .online { background: #dcfce7; color: #047857; }
    .stale { background: #fef3c7; color: #92400e; }
    .offline { background: #fee2e2; color: #b91c1c; }
    [data-theme="dark"] .online { background: #083c2b; color: #55d69f; }
    [data-theme="dark"] .stale { background: #463305; color: #f3bd4d; }
    [data-theme="dark"] .offline { background: #471313; color: #ff8f8f; }
    .bars { display: grid; gap: 9px; }
    .bar-row { display: grid; gap: 4px; }
    .bar-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .bar { height: 7px; background: color-mix(in srgb, var(--line) 80%, transparent); border-radius: 99px; overflow: hidden; }
    .bar span { display: block; height: 100%; border-radius: inherit; background: var(--accent); width: 0; }
    .detail-line { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; font-size: 12px; color: var(--muted); }
    .server-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    table { width: 100%; min-width: 920px; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-size: 12px; font-weight: 800; background: color-mix(in srgb, var(--surface) 74%, var(--bg)); }
    tbody tr:hover { background: color-mix(in srgb, var(--accent) 7%, transparent); }
    td .server-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metric-cell { min-width: 112px; }
    .mini-bar { width: 86px; height: 6px; margin-top: 5px; background: color-mix(in srgb, var(--line) 80%, transparent); border-radius: 99px; overflow: hidden; }
    .mini-bar span { display: block; height: 100%; background: var(--accent); }
    .panel { padding: 16px; margin-bottom: 14px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    .panel h2 { margin: 0; font-size: 17px; }
    .form { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .field { display: grid; gap: 5px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 700; }
    input, select { width: 100%; height: 38px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); padding: 0 10px; }
    .modal { position: fixed; inset: 0; background: rgba(12, 18, 28, .48); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 10; }
    .modal.open { display: flex; }
    .dialog { width: min(760px, 100%); max-height: 88vh; overflow: auto; background: var(--surface); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 28px 80px rgba(0,0,0,.28); padding: 16px; }
    .dialog-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dialog h3 { margin: 0; font-size: 18px; }
    .command { background: #0b1020; color: #dbeafe; padding: 12px; border-radius: 8px; overflow: auto; white-space: pre-wrap; overflow-wrap: anywhere; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    canvas { width: 100%; max-height: 260px; }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; background: color-mix(in srgb, var(--surface) 75%, transparent); }
    .hide { display: none !important; }
    @media (max-width: 820px) {
      header { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .shell { padding: 12px; }
      .stats, .servers, .detail-line { grid-template-columns: 1fr; }
      .value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1 id="title">服务器全景探针</h1>
        <div class="subtitle" id="subtitle">资源、流量、延迟、状态一屏看清</div>
      </div>
      <div class="toolbar">
        <div class="segmented" role="group" aria-label="视图切换">
          <button id="cardViewBtn" class="active" title="卡片视图"><i data-lucide="layout-grid"></i></button>
          <button id="tableViewBtn" title="表格视图"><i data-lucide="table-2"></i></button>
        </div>
        <button class="icon-btn" id="refreshBtn" title="刷新"><i data-lucide="refresh-cw"></i></button>
        <button class="icon-btn" id="themeBtn" title="切换主题"><i data-lucide="sun-moon"></i></button>
        <button class="text-btn" id="loginBtn"><i data-lucide="lock"></i><span>登录</span></button>
        <button class="text-btn primary hide" id="addBtn"><i data-lucide="plus"></i><span>纳管服务器</span></button>
      </div>
    </header>

    <section class="grid stats">
      <div class="stat"><div class="label">在线</div><div class="value" id="onlineCount">0</div></div>
      <div class="stat"><div class="label">服务器</div><div class="value" id="serverCount">0</div></div>
      <div class="stat"><div class="label">入站速率</div><div class="value" id="speedIn">0 B/s</div></div>
      <div class="stat"><div class="label">出站速率</div><div class="value" id="speedOut">0 B/s</div></div>
    </section>

    <section class="panel hide" id="adminPanel">
      <div class="panel-head">
        <h2>面板设置</h2>
        <button class="text-btn primary" id="saveSettingsBtn"><i data-lucide="save"></i><span>保存</span></button>
      </div>
      <div class="form">
        <div class="field"><label>标题</label><input id="siteTitleInput"></div>
        <div class="field"><label>公开看板</label><select id="publicInput"><option value="true">开启</option><option value="false">关闭</option></select></div>
        <div class="field"><label>上报间隔（秒）</label><input id="intervalInput" type="number" min="10" max="300"></div>
        <div class="field"><label>流量周期自动重置</label><select id="resetInput"><option value="true">开启</option><option value="false">关闭</option></select></div>
      </div>
    </section>

    <section class="grid servers" id="servers"></section>
    <section class="table-wrap hide" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th>服务器</th>
            <th>状态</th>
            <th>CPU</th>
            <th>内存</th>
            <th>磁盘</th>
            <th>速率</th>
            <th>月流量</th>
            <th>延迟</th>
            <th>最后上报</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="serverRows"></tbody>
      </table>
    </section>
    <section class="empty hide" id="empty">暂无服务器。登录后添加 VPS 并执行安装命令即可接入。</section>
  </main>

  <div class="modal" id="loginModal">
    <div class="dialog">
      <div class="dialog-head"><h3>管理员登录</h3><button class="icon-btn" data-close="loginModal"><i data-lucide="x"></i></button></div>
      <div class="form">
        <div class="field"><label>用户名</label><input id="username" autocomplete="username" value="admin"></div>
        <div class="field"><label>密码</label><input id="password" type="password" autocomplete="current-password"></div>
        <div class="field"><label>&nbsp;</label><button class="text-btn primary" id="doLogin"><i data-lucide="log-in"></i><span>登录</span></button></div>
      </div>
    </div>
  </div>

  <div class="modal" id="serverModal">
    <div class="dialog">
      <div class="dialog-head"><h3>纳管服务器</h3><button class="icon-btn" data-close="serverModal"><i data-lucide="x"></i></button></div>
      <div class="form">
        <div class="field"><label>公网 IP</label><input id="serverIp" placeholder="1.2.3.4"></div>
        <div class="field"><label>名称</label><input id="serverName" placeholder="东京-01"></div>
        <div class="field"><label>分组</label><input id="serverGroup" value="default"></div>
        <div class="field"><label>&nbsp;</label><button class="text-btn primary" id="createServer"><i data-lucide="server"></i><span>生成命令</span></button></div>
      </div>
      <div id="commandWrap" class="hide" style="margin-top:12px">
        <div class="label" style="margin-bottom:6px">在 VPS 上以 root 执行</div>
        <div class="command" id="commandText"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="dialog">
      <div class="dialog-head"><h3 id="detailTitle">详情</h3><button class="icon-btn" data-close="detailModal"><i data-lucide="x"></i></button></div>
      <div class="grid stats">
        <div class="stat"><div class="label">系统</div><div class="value" id="dOs" style="font-size:16px"></div></div>
        <div class="stat"><div class="label">架构</div><div class="value" id="dArch" style="font-size:16px"></div></div>
        <div class="stat"><div class="label">进程</div><div class="value" id="dProc"></div></div>
        <div class="stat"><div class="label">连接</div><div class="value" id="dConn"></div></div>
      </div>
      <canvas id="historyChart"></canvas>
    </div>
  </div>

  <script>
    const state = { token: localStorage.getItem("probe_token") || "", data: { servers: [], settings: {} }, chart: null, view: localStorage.getItem("probe_view") || "card" };
    const $ = id => document.getElementById(id);

    function authHeaders() {
      return state.token ? { Authorization: `Bearer ${state.token}` } : {};
    }

    function fmtBytes(value) {
      const n = Number(value || 0);
      const units = ["B", "KB", "MB", "GB", "TB", "PB"];
      let size = n, i = 0;
      while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
      return `${size.toFixed(i ? 1 : 0)} ${units[i]}`;
    }

    function fmtSpeed(value) { return `${fmtBytes(value)}/s`; }
    function pct(value) { return Math.max(0, Math.min(100, Number(value || 0))); }
    function age(ts) {
      if (!ts) return "从未上报";
      const s = Math.floor((Date.now() - Number(ts)) / 1000);
      if (s < 60) return `${s}s 前`;
      if (s < 3600) return `${Math.floor(s / 60)}m 前`;
      return `${Math.floor(s / 3600)}h 前`;
    }

    async function request(path, options = {}) {
      const res = await fetch(path, { ...options, headers: { "Content-Type": "application/json", ...authHeaders(), ...(options.headers || {}) } });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
      return body;
    }

    async function load() {
      const path = state.token ? "/api/data" : "/api/public";
      try {
        state.data = await request(path);
      } catch (error) {
        if (state.token) {
          localStorage.removeItem("probe_token");
          state.token = "";
          state.data = await request("/api/public").catch(() => ({ servers: [], settings: {} }));
        } else {
          state.data = { servers: [], settings: {} };
        }
      }
      render();
    }

    function render() {
      const { servers, settings } = state.data;
      document.documentElement.dataset.theme = settings.theme || localStorage.getItem("probe_theme") || "light";
      document.title = settings.site_title || "服务器全景探针";
      $("title").textContent = settings.site_title || "服务器全景探针";
      $("siteTitleInput").value = settings.site_title || "";
      $("publicInput").value = settings.is_public || "true";
      $("intervalInput").value = settings.report_interval || 15;
      $("resetInput").value = settings.auto_reset_traffic || "true";
      $("adminPanel").classList.toggle("hide", !state.token);
      $("addBtn").classList.toggle("hide", !state.token);
      $("loginBtn").innerHTML = state.token ? '<i data-lucide="log-out"></i><span>退出</span>' : '<i data-lucide="lock"></i><span>登录</span>';

      const online = servers.filter(s => s.state === "online").length;
      $("onlineCount").textContent = online;
      $("serverCount").textContent = servers.length;
      $("speedIn").textContent = fmtSpeed(servers.reduce((sum, s) => sum + Number(s.net_in_speed || 0), 0));
      $("speedOut").textContent = fmtSpeed(servers.reduce((sum, s) => sum + Number(s.net_out_speed || 0), 0));
      $("empty").classList.toggle("hide", servers.length > 0);
      $("servers").classList.toggle("hide", state.view !== "card" || servers.length === 0);
      $("tableWrap").classList.toggle("hide", state.view !== "table" || servers.length === 0);
      $("cardViewBtn").classList.toggle("active", state.view === "card");
      $("tableViewBtn").classList.toggle("active", state.view === "table");
      $("servers").innerHTML = servers.map(serverCard).join("");
      $("serverRows").innerHTML = servers.map(serverRow).join("");
      lucide.createIcons();
    }

    function serverCard(s) {
      const statusText = s.state === "online" ? "在线" : s.state === "stale" ? "延迟" : "离线";
      return `<article class="server">
        <div class="server-top">
          <div>
            <div class="server-name">${escapeHtml(s.name || s.ip)}</div>
            <div class="meta">${escapeHtml(s.ip)} · ${escapeHtml(s.group_name || "default")} · ${age(s.last_report)}</div>
          </div>
          <span class="pill ${s.state}">${statusText}</span>
        </div>
        <div class="bars">
          ${bar("CPU", s.cpu)}
          ${bar("内存", s.mem, `${fmtBytes(s.ram_used)} / ${fmtBytes(s.ram_total)}`)}
          ${bar("磁盘", s.disk, `${fmtBytes(s.disk_used)} / ${fmtBytes(s.disk_total)}`)}
        </div>
        <div class="detail-line">
          <div>入 ${fmtSpeed(s.net_in_speed)}</div><div>出 ${fmtSpeed(s.net_out_speed)}</div>
          <div>月入 ${fmtBytes(s.monthly_rx)}</div><div>月出 ${fmtBytes(s.monthly_tx)}</div>
          <div>CT ${s.ping_ct || 0}ms</div><div>CU ${s.ping_cu || 0}ms · CM ${s.ping_cm || 0}ms</div>
        </div>
        <div class="server-actions">
          <button class="icon-btn" title="详情" onclick="openDetail('${encodeURIComponent(s.ip)}')"><i data-lucide="activity"></i></button>
          ${state.token ? `<button class="icon-btn danger" title="删除" onclick="deleteServer('${encodeURIComponent(s.ip)}')"><i data-lucide="trash-2"></i></button>` : ""}
        </div>
      </article>`;
    }

    function bar(label, value, sub = `${Number(value || 0).toFixed(1)}%`) {
      return `<div class="bar-row"><div class="bar-head"><span>${label}</span><span>${sub}</span></div><div class="bar"><span style="width:${pct(value)}%"></span></div></div>`;
    }

    function miniMetric(value, sub = `${Number(value || 0).toFixed(1)}%`) {
      return `<div class="metric-cell"><div>${sub}</div><div class="mini-bar"><span style="width:${pct(value)}%"></span></div></div>`;
    }

    function serverRow(s) {
      const statusText = s.state === "online" ? "在线" : s.state === "stale" ? "延迟" : "离线";
      return `<tr>
        <td><div class="server-name">${escapeHtml(s.name || s.ip)}</div><div class="meta">${escapeHtml(s.ip)} · ${escapeHtml(s.group_name || "default")}</div></td>
        <td><span class="pill ${s.state}">${statusText}</span></td>
        <td>${miniMetric(s.cpu)}</td>
        <td>${miniMetric(s.mem, `${fmtBytes(s.ram_used)} / ${fmtBytes(s.ram_total)}`)}</td>
        <td>${miniMetric(s.disk, `${fmtBytes(s.disk_used)} / ${fmtBytes(s.disk_total)}`)}</td>
        <td>入 ${fmtSpeed(s.net_in_speed)}<br>出 ${fmtSpeed(s.net_out_speed)}</td>
        <td>入 ${fmtBytes(s.monthly_rx)}<br>出 ${fmtBytes(s.monthly_tx)}</td>
        <td>CT ${s.ping_ct || 0}ms<br>CU ${s.ping_cu || 0}ms · CM ${s.ping_cm || 0}ms</td>
        <td>${age(s.last_report)}</td>
        <td>
          <button class="icon-btn" title="详情" onclick="openDetail('${encodeURIComponent(s.ip)}')"><i data-lucide="activity"></i></button>
          ${state.token ? `<button class="icon-btn danger" title="删除" onclick="deleteServer('${encodeURIComponent(s.ip)}')"><i data-lucide="trash-2"></i></button>` : ""}
        </td>
      </tr>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }

    function openModal(id) { $(id).classList.add("open"); }
    function closeModal(id) { $(id).classList.remove("open"); }

    window.openDetail = function(rawIp) {
      const ip = decodeURIComponent(rawIp);
      const s = state.data.servers.find(item => item.ip === ip);
      if (!s) return;
      $("detailTitle").textContent = s.name || s.ip;
      $("dOs").textContent = s.os || "-";
      $("dArch").textContent = s.arch || "-";
      $("dProc").textContent = s.processes || 0;
      $("dConn").textContent = `${s.tcp_conn || 0}/${s.udp_conn || 0}`;
      let h = {};
      try { h = JSON.parse(s.history || "{}"); } catch {}
      if (state.chart) state.chart.destroy();
      state.chart = new Chart($("historyChart"), {
        type: "line",
        data: {
          labels: h.time || [],
          datasets: [
            { label: "CPU", data: h.cpu || [], borderColor: "#2563eb", tension: .3, pointRadius: 0 },
            { label: "内存", data: h.ram || [], borderColor: "#0f9f6e", tension: .3, pointRadius: 0 },
            { label: "磁盘", data: h.disk || [], borderColor: "#d97706", tension: .3, pointRadius: 0 },
          ],
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } },
      });
      openModal("detailModal");
    };

    window.deleteServer = async function(rawIp) {
      const ip = decodeURIComponent(rawIp);
      if (!confirm(`删除 ${ip}？`)) return;
      await request(`/api/servers?ip=${encodeURIComponent(ip)}`, { method: "DELETE" });
      await load();
    };

    $("refreshBtn").onclick = load;
    $("cardViewBtn").onclick = () => { state.view = "card"; localStorage.setItem("probe_view", state.view); render(); };
    $("tableViewBtn").onclick = () => { state.view = "table"; localStorage.setItem("probe_view", state.view); render(); };
    $("themeBtn").onclick = async () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      localStorage.setItem("probe_theme", next);
      document.documentElement.dataset.theme = next;
      if (state.token) await request("/api/settings", { method: "POST", body: JSON.stringify({ theme: next }) }).catch(() => {});
    };
    $("loginBtn").onclick = async () => {
      if (state.token) {
        await request("/api/logout", { method: "POST" }).catch(() => {});
        state.token = "";
        localStorage.removeItem("probe_token");
        await load();
      } else openModal("loginModal");
    };
    $("doLogin").onclick = async () => {
      const res = await request("/api/login", { method: "POST", body: JSON.stringify({ username: $("username").value, password: $("password").value }) });
      state.token = res.token;
      localStorage.setItem("probe_token", res.token);
      closeModal("loginModal");
      await load();
    };
    $("addBtn").onclick = () => { $("commandWrap").classList.add("hide"); openModal("serverModal"); };
    $("createServer").onclick = async () => {
      const res = await request("/api/servers", { method: "POST", body: JSON.stringify({ ip: $("serverIp").value.trim(), name: $("serverName").value.trim(), group_name: $("serverGroup").value.trim() }) });
      $("commandText").textContent = res.command;
      $("commandWrap").classList.remove("hide");
      await navigator.clipboard?.writeText(res.command).catch(() => {});
      await load();
    };
    $("saveSettingsBtn").onclick = async () => {
      await request("/api/settings", { method: "POST", body: JSON.stringify({
        site_title: $("siteTitleInput").value,
        is_public: $("publicInput").value,
        report_interval: $("intervalInput").value,
        auto_reset_traffic: $("resetInput").value,
      }) });
      await load();
    };
    document.querySelectorAll("[data-close]").forEach(btn => btn.onclick = () => closeModal(btn.dataset.close));
    document.querySelectorAll(".modal").forEach(modal => modal.addEventListener("click", event => { if (event.target === modal) closeModal(modal.id); }));

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
